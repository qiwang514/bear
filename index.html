<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小熊情绪抱抱屋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fff5f8 0%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(255, 182, 193, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .bear-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #ff8fab;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .emotion-select {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .emotion-btn {
            padding: 12px 18px;
            border: none;
            border-radius: 20px;
            background: #fff0f5;
            color: #ff6b9d;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .emotion-btn:hover, .emotion-btn.active {
            background: #ff8fab;
            color: white;
            transform: scale(1.05);
        }

        .input-box {
            width: 100%;
            height: 150px;
            border: 2px solid #ffe0e9;
            border-radius: 16px;
            padding: 15px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            background: #fffbfc;
        }

        .input-box:focus {
            border-color: #ff8fab;
        }

        .submit-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff8fab 0%, #ffb3c1 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.05);
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            animation: modalopen 0.3s ease;
        }

        @keyframes modalopen {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-bear {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .modal-text {
            font-size: 18px;
            color: #ff6b9d;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        .close-btn {
            padding: 10px 25px;
            background: #ff8fab;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bear-icon">🧸</div>
        <h1>雷雨璐小熊情绪抱抱屋</h1>

        <div class="emotion-select">
            <button class="emotion-btn" data-emotion="happy">😊 开心</button>
            <button class="emotion-btn" data-emotion="sad">😢 难过</button>
            <button class="emotion-btn" data-emotion="tired">😮‍💨 疲惫</button>
            <button class="emotion-btn" data-emotion="anxious">😰 加班</button>
            <button class="emotion-btn" data-emotion="emo">🥺 emo</button>
        </div>

        <textarea class="input-box" placeholder="写下你现在的心情吧，小熊会接住你的所有情绪~"></textarea>
        <button class="submit-btn">给小熊抱抱</button>
    </div>

    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-bear">🧸</div>
            <p class="modal-text" id="modalText"></p>
            <button class="close-btn">收到小熊的抱抱啦</button>
        </div>
    </div>

    <script>
        const emotionBtns = document.querySelectorAll('.emotion-btn');
        const inputBox = document.querySelector('.input-box');
        const submitBtn = document.querySelector('.submit-btn');
        const modal = document.getElementById('modal');
        const modalText = document.getElementById('modalText');
        const closeBtn = document.querySelector('.close-btn');

        const responses = {
            happy: "哇！你的快乐也分给小熊一点吧～真为小雷感到开心！✨",
            sad: "没关系，小雷可以在这里尽情难过，小熊会一直陪着你，给你一个大大的拥抱。",
            tired: "今天也辛苦啦，小熊知道你已经很努力了，现在可以停下来歇一歇～",
            anxious: "熬夜加班真的超辛苦啦，慢慢来别太累，你已经超级棒了，忙完一定要好好休息💤",
            emo: "抱抱你！偶尔emo也没关系，允许自己不开心，然后我们一起慢慢恢复元气～"
        };

        let selectedEmotion = 'happy';

        emotionBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                emotionBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedEmotion = btn.dataset.emotion;
            });
        });

        // 提交弹出弹窗
        submitBtn.addEventListener('click', () => {
            modalText.textContent = responses[selectedEmotion];
            modal.style.display = 'flex';
        });

        // 关闭弹窗
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });
    </script>
</body>
</html>
